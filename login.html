<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PVT HR Leave</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main class="login-page">
    <section class="logo-area">
      <img src="/assets/icons/logo-pvt.png" alt="PVT" class="login-logo" />
      <h1>PVT HR Leave</h1>
      <p>ระบบขออนุญาตลาออนไลน์</p>
    </section>

    <form id="loginForm" class="login-card">
      <h2>เข้าสู่ระบบ</h2>

      <div class="form-group">
        <label for="username">รหัสพนักงาน</label>
        <input type="text" id="username" placeholder="รหัสพนักงาน หรือ ชื่อ-นามกสุล" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน เช่น ใช้ปีเกิด + ลำดับพนักงาน" autocomplete="current-password" required />
          <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="แสดงหรือซ่อนรหัสผ่าน">👁</button>
        </div>
      </div>

      <div class="option-row">
        <label class="remember">
          <input type="checkbox" id="rememberMe" />
          จดจำการเข้าสู่ระบบ
        </label>
        <button type="button" class="forgot-btn" onclick="showResetHint()">ลืมรหัสผ่าน</button>
      </div>

      <p id="loginStatus" class="form-status" aria-live="polite"></p>

      <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
      <button type="button" class="qr-btn" onclick="loginByQr()">สแกน QR Code</button>
    </form>

    <p class="footer-text">Version 1.1.0</p>
  </main>

  <script src="/js/supabase-config.js"></script>
  <script src="/auth/login.js"></script>
</body>
</html>
