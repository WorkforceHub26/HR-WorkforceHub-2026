<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอนุมัติใบลาสำหรับหัวหน้า</title>
    <link rel="stylesheet" href="/css/approver.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="user-info">
                <h2 id="approverName">กำลังโหลดข้อมูล...</h2>
                <p id="approverRole">ตำแหน่ง: - | ฝ่าย: -</p>
            </div>
            <button id="btnLogout" class="btn-logout">ออกจากระบบ</button>
        </header>

        <section class="summary-cards">
            <div class="card pending">
                <h3>รออนุมัติ</h3>
                <span id="countPending">0</span> รายการ
            </div>
            <div class="card approved">
                <h3>อนุมัติแล้ว</h3>
                <span id="countApproved">0</span> รายการ
            </div>
            <div class="card rejected">
                <h3>ไม่อนุมัติ</h3>
                <span id="countRejected">0</span> รายการ
            </div>
        </section>

        <main class="main-content">
            <div class="table-container">
                <div class="table-header">
                    <h3>รายการขออนุมัติลาพักผ่อน / ลาอื่นๆ ของผู้ใต้บังคับบัญชา</h3>
                </div>
                
                <table class="leave-table">
                    <thead>
                        <tr>
                            <th>รหัสพนักงาน</th>
                            <th>ชื่อ-นามสกุล</th>
                            <th>ประเภทการลา</th>
                            <th>วันที่ลา</th>
                            <th>จำนวนวัน</th>
                            <th>เหตุผล</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTableBody">
                        <tr>
                            <td colspan="8" class="text-center">กำลังโหลดข้อมูลใบลา...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">พิจารณาใบลา</h3>
            <p id="modalEmployeeName">พนักงาน: </p>
            <input type="hidden" id="targetLeaveId">
            <input type="hidden" id="targetStatus">
            
            <div class="form-group">
                <label for="approvalComment">ความคิดเห็น / เหตุผล:</label>
                <textarea id="approvalComment" rows="3" placeholder="ระบุเหตุผลอนุมัติตามขั้นตอนฝ่ายบุคคล หรือเหตุผลที่ไม่นุมัติ..."></textarea>
            </div>
            
            <div class="modal-actions">
                <button id="btnConfirmAction" class="btn-confirm">ยืนยัน</button>
                <button id="btnCancelAction" class="btn-cancel">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script src="approver.js"></script>
</body>
</html>
